<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versicherungsvertrags-Rechner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Tarifrechner</h1>
        <p>Bitte geben Sie Ihre Daten ein, um ihren monatlichen Beitrag zu berechnen.</p>

        <form id="tarifrechner-form">
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Ihr Name">

            <label for="alter">Alter:</label>
            <input type="number" id="alter" placeholder="Ihr Alter">

            <label for="versicherung">Versicherungsart:</label>
            <select id="versicherung">
                <option value="">Bitte auswählen</option>
                <option value="haftpflicht">Haftpflicht</option>
                <option value="hausrat">Hausratversicherung</option>
                <option value="rechtsschutz">Rechtsschutz</option>
            </select>

            <label for="laufzeit">Laufzeit in Jahren:</label>
            <input type="number" id="laufzeit" placeholder="z. B. 2">

            <label for="zusatzschutz">Zusatzschutz:</label>
            <select id="zusatzschutz">
                <option value="">Bitte auswählen</option>
                <option value="ja">Ja</option>
                <option value="nein">Nein</option>
            </select>

            <label for="email">E-Mail:</label>
            <input type="email" id="email" placeholder="Ihre E-Mail">

            <button type="button" id="berechnen-btn">Jetzt Beitrag berechnen</button>
        </form>

        <div id="ergebnis">
            <h2>Ergebnis</h2>
            <p id="ergebnis-text">Hier wird später Ihr Beitrag angezeigt.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
